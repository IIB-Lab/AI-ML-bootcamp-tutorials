<svg width="880" height="280" viewBox="0 0 880 280" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <rect width="880" height="280" fill="white"/>
  <rect x="20" y="20" width="150" height="52" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
  <text x="95" y="42" text-anchor="middle">Outdoor weather</text>
  <text x="95" y="60" text-anchor="middle" font-size="11">temp, humidity, wind</text>
  <rect x="20" y="84" width="150" height="52" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
  <text x="95" y="106" text-anchor="middle">Solar gain</text>
  <text x="95" y="124" text-anchor="middle" font-size="11">direct/diffuse/ground</text>
  <rect x="20" y="148" width="150" height="44" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/>
  <text x="95" y="175" text-anchor="middle">Setpoint schedule</text>
  <rect x="20" y="204" width="150" height="52" rx="8" fill="#fdeaea" stroke="#c0392b" stroke-width="1.8"/>
  <text x="95" y="226" text-anchor="middle">HVAC action</text>
  <text x="95" y="244" text-anchor="middle" font-size="11">elec_hvac (control)</text>
  <g stroke="#4b5563" stroke-width="1.6" fill="none" marker-end="url(#ar)">
    <line x1="170" y1="46" x2="326" y2="112"/>
    <line x1="170" y1="110" x2="326" y2="130"/>
    <line x1="170" y1="170" x2="326" y2="150"/>
    <line x1="170" y1="230" x2="326" y2="170"/>
  </g>
  <rect x="330" y="90" width="190" height="100" rx="10" fill="#eaf2fb" stroke="#4682b4" stroke-width="2"/>
  <text x="425" y="120" text-anchor="middle" font-weight="bold">Building zone now</text>
  <text x="425" y="143" text-anchor="middle" font-size="11">current state: Ti, mrt, rh</text>
  <text x="425" y="162" text-anchor="middle" font-size="11">(time t)</text>
  <path d="M520 140 L616 140" stroke="#4b5563" stroke-width="1.8" fill="none" marker-end="url(#ar)"/>
  <text x="568" y="130" text-anchor="middle" font-size="11">one timestep</text>
  <rect x="620" y="100" width="160" height="82" rx="10" fill="#eafaf0" stroke="#27ae60" stroke-width="2.2"/>
  <text x="700" y="130" text-anchor="middle" font-weight="bold">Ti[t+1]</text>
  <text x="700" y="152" text-anchor="middle" font-size="11">next indoor temperature</text>
  <text x="700" y="170" text-anchor="middle" font-size="11">(the target)</text>
  <path d="M700 182 C700 244 520 254 425 196" stroke="#9ca3af" stroke-width="1.4" fill="none" marker-end="url(#ar)" stroke-dasharray="4 3"/>
  <text x="556" y="270" text-anchor="middle" font-size="11" fill="#6b7280">...and Ti[t+1] becomes the state the controller reasons about at the next step</text>
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4b5563"/></marker></defs>
</svg>