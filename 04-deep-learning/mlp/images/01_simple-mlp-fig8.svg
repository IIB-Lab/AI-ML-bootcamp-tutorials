<svg width="620" height="150" viewBox="0 0 620 150" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <rect x="0" y="0" width="620" height="150" fill="white"/>
  <text x="20" y="24" font-size="13" font-weight="bold">one epoch</text>
  <!-- full dataset -->
  <text x="20" y="55" fill="#555">shuffle, then slice into mini-batches:</text>
  <g>
    <rect x="20"  y="65" width="130" height="30" fill="#eaf2fb" stroke="#4682b4"/><text x="85" y="85" text-anchor="middle">batch 1</text>
    <rect x="155" y="65" width="130" height="30" fill="#eaf2fb" stroke="#4682b4"/><text x="220" y="85" text-anchor="middle">batch 2</text>
    <rect x="290" y="65" width="130" height="30" fill="#eaf2fb" stroke="#4682b4"/><text x="355" y="85" text-anchor="middle">batch 3</text>
    <rect x="425" y="65" width="90" height="30" fill="#eaf2fb" stroke="#4682b4"/><text x="470" y="85" text-anchor="middle">...</text>
  </g>
  <!-- one step per batch -->
  <g stroke="#c0392b" stroke-width="2" marker-end="url(#s7)" fill="none">
    <line x1="85"  y1="100" x2="85"  y2="125"/><line x1="220" y1="100" x2="220" y2="125"/>
    <line x1="355" y1="100" x2="355" y2="125"/><line x1="470" y1="100" x2="470" y2="125"/>
  </g>
  <text x="270" y="145" text-anchor="middle" fill="#c0392b">one gradient-descent step per mini-batch</text>
  <defs><marker id="s7" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker></defs>
</svg>