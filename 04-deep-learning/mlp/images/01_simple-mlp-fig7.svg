<svg width="620" height="250" viewBox="0 0 620 250" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="620" height="250" fill="white"/>
  <!-- input block -->
  <rect x="20" y="95" width="70" height="60" rx="8" fill="#eaf2fb" stroke="#4682b4" stroke-width="2"/>
  <text x="55" y="120" text-anchor="middle">64</text><text x="55" y="138" text-anchor="middle" font-size="11">pixels</text>
  <!-- hidden -->
  <rect x="170" y="80" width="70" height="90" rx="8" fill="#fdeaea" stroke="#c0392b" stroke-width="2"/>
  <text x="205" y="120" text-anchor="middle">H</text><text x="205" y="138" text-anchor="middle" font-size="11">hidden</text>
  <!-- edges -->
  <line x1="90" y1="125" x2="170" y2="125" stroke="#4682b4" stroke-width="2" marker-end="url(#a7)"/>
  <line x1="240" y1="125" x2="330" y2="125" stroke="#c0392b" stroke-width="2" marker-end="url(#a7)"/>
  <!-- 10 outputs -->
  <g>
    <rect x="335" y="15" width="120" height="220" rx="8" fill="#f7fbf9" stroke="#27ae60" stroke-width="1.5"/>
    <text x="395" y="10" text-anchor="middle" font-size="11" fill="#555"> </text>
  </g>
  <g font-size="12">
    <rect x="350" y="22" width="90" height="17" fill="#eafaf0" stroke="#bbb"/><text x="360" y="35">0 : 0.01</text>
    <rect x="350" y="42" width="90" height="17" fill="#eafaf0" stroke="#bbb"/><text x="360" y="55">1 : 0.02</text>
    <rect x="350" y="62" width="90" height="17" fill="#eafaf0" stroke="#bbb"/><text x="360" y="75">2 : 0.05</text>
    <rect x="350" y="82" width="90" height="17" fill="#eafaf0" stroke="#bbb"/><text x="360" y="95">... </text>
    <rect x="350" y="102" width="90" height="17" fill="#27ae60"/><text x="360" y="115" fill="white">7 : 0.94</text>
    <rect x="350" y="122" width="90" height="17" fill="#eafaf0" stroke="#bbb"/><text x="360" y="135">8 : 0.03</text>
    <rect x="350" y="142" width="90" height="17" fill="#eafaf0" stroke="#bbb"/><text x="360" y="155">9 : 0.06</text>
  </g>
  <text x="395" y="205" text-anchor="middle" font-size="11" fill="#555">10 output scores</text>
  <!-- argmax -->
  <line x1="455" y1="110" x2="520" y2="110" stroke="#27ae60" stroke-width="2" marker-end="url(#a7)"/>
  <text x="487" y="100" text-anchor="middle" font-size="11" fill="#27ae60">argmax</text>
  <circle cx="560" cy="110" r="30" fill="#eafaf0" stroke="#27ae60" stroke-width="2"/>
  <text x="560" y="116" text-anchor="middle" font-size="22">7</text>
  <defs><marker id="a7" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#555"/></marker></defs>
</svg>