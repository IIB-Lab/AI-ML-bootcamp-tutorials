<svg width="640" height="210" viewBox="0 0 640 210" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="15">
  <rect x="0" y="0" width="640" height="210" fill="white"/>
  <circle cx="70" cy="105" r="26" fill="#eaf2fb" stroke="#4682b4" stroke-width="2"/>
  <text x="70" y="111" text-anchor="middle">x</text>
  <line x1="96" y1="105" x2="250" y2="105" stroke="#4682b4" stroke-width="2" marker-end="url(#ar)"/>
  <text x="170" y="92" text-anchor="middle" fill="#333">multiply by w</text>
  <rect x="252" y="70" width="150" height="70" rx="10" fill="#fdeaea" stroke="#c0392b" stroke-width="2"/>
  <text x="327" y="100" text-anchor="middle">z = w·x + b</text>
  <text x="327" y="124" text-anchor="middle" fill="#c0392b">then σ(z)</text>
  <text x="327" y="58" text-anchor="middle" fill="#555">bias b added inside</text>
  <line x1="402" y1="105" x2="500" y2="105" stroke="#c0392b" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="540" cy="105" r="30" fill="#eafaf0" stroke="#27ae60" stroke-width="2"/>
  <text x="540" y="103" text-anchor="middle">a =</text>
  <text x="540" y="122" text-anchor="middle">σ(z)</text>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
</svg>