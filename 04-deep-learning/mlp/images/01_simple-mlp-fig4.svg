<svg width="760" height="230" viewBox="0 0 760 230" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <rect width="760" height="230" fill="white"/>
  <text x="20" y="24" font-weight="bold">The chain rule = a product of local derivatives (one per layer)</text>
  <!-- Row 1: dL/dW1 -->
  <rect x="20" y="44" width="128" height="46" rx="7" fill="#fdeaea" stroke="#c0392b"/>
  <text x="84" y="63" text-anchor="middle">&#8706;L / &#8706;&#375;</text>
  <text x="84" y="80" text-anchor="middle" fill="#c0392b">= &#375; &#8722; y</text>
  <text x="158" y="72" text-anchor="middle">&#215;</text>
  <rect x="170" y="44" width="128" height="46" rx="7" fill="#eaf2fb" stroke="#4682b4"/>
  <text x="234" y="63" text-anchor="middle">&#8706;&#375; / &#8706;a&#8321;</text>
  <text x="234" y="80" text-anchor="middle">= W&#8322;</text>
  <text x="308" y="72" text-anchor="middle">&#215;</text>
  <rect x="320" y="44" width="128" height="46" rx="7" fill="#eaf2fb" stroke="#4682b4"/>
  <text x="384" y="63" text-anchor="middle">&#8706;a&#8321; / &#8706;z&#8321;</text>
  <text x="384" y="80" text-anchor="middle">= &#963;'(z&#8321;)</text>
  <text x="458" y="72" text-anchor="middle">&#215;</text>
  <rect x="470" y="44" width="128" height="46" rx="7" fill="#eaf2fb" stroke="#4682b4"/>
  <text x="534" y="63" text-anchor="middle">&#8706;z&#8321; / &#8706;W&#8321;</text>
  <text x="534" y="80" text-anchor="middle">= x</text>
  <text x="610" y="72" text-anchor="middle">=</text>
  <rect x="624" y="44" width="118" height="46" rx="7" fill="#eafaf0" stroke="#27ae60"/>
  <text x="683" y="71" text-anchor="middle" font-weight="bold">&#8706;L / &#8706;W&#8321;</text>
  <!-- Row 2: dL/dW2 -->
  <rect x="20" y="120" width="128" height="46" rx="7" fill="#fdeaea" stroke="#c0392b"/>
  <text x="84" y="139" text-anchor="middle">&#8706;L / &#8706;&#375;</text>
  <text x="84" y="156" text-anchor="middle" fill="#c0392b">= &#375; &#8722; y</text>
  <text x="158" y="148" text-anchor="middle">&#215;</text>
  <rect x="170" y="120" width="128" height="46" rx="7" fill="#eaf2fb" stroke="#4682b4"/>
  <text x="234" y="139" text-anchor="middle">&#8706;&#375; / &#8706;W&#8322;</text>
  <text x="234" y="156" text-anchor="middle">= a&#8321;</text>
  <text x="308" y="148" text-anchor="middle">=</text>
  <rect x="322" y="120" width="118" height="46" rx="7" fill="#eafaf0" stroke="#27ae60"/>
  <text x="381" y="147" text-anchor="middle" font-weight="bold">&#8706;L / &#8706;W&#8322;</text>
  <text x="20" y="200" fill="#c0392b">The red factor &#948;&#8322; = &#375; &#8722; y is computed once at the output and reused by every layer below —</text>
  <text x="20" y="218" fill="#c0392b">that reuse is what backpropagation buys over re-deriving each gradient from scratch.</text>
</svg>