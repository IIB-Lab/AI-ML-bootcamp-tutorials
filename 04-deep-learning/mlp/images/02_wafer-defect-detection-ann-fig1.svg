<svg width="920" height="330" viewBox="0 0 920 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wafer fabrication stages send sensor readings into one dataset row">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4b5563"/>
    </marker>
  </defs>
  <text x="34" y="32" font-family="Arial" font-size="12" fill="#4b5563" font-weight="700">Wafer moves through process stages</text>
  <rect x="30" y="58" width="112" height="62" rx="8" fill="#eef6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="86" y="84" text-anchor="middle" font-family="Arial" font-size="13" fill="#111827">Deposition</text>
  <text x="86" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">film growth</text>
  <rect x="172" y="58" width="124" height="62" rx="8" fill="#eef6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="234" y="84" text-anchor="middle" font-family="Arial" font-size="13" fill="#111827">Lithography</text>
  <text x="234" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">pattern transfer</text>
  <rect x="326" y="58" width="96" height="62" rx="8" fill="#eef6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="374" y="84" text-anchor="middle" font-family="Arial" font-size="13" fill="#111827">Etch</text>
  <text x="374" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">remove material</text>
  <rect x="452" y="58" width="132" height="62" rx="8" fill="#eef6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="518" y="84" text-anchor="middle" font-family="Arial" font-size="13" fill="#111827">Implant / diffuse</text>
  <text x="518" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">set electrical behavior</text>
  <rect x="614" y="58" width="94" height="62" rx="8" fill="#eef6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="661" y="84" text-anchor="middle" font-family="Arial" font-size="13" fill="#111827">CMP</text>
  <text x="661" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">planarize</text>
  <rect x="738" y="58" width="132" height="62" rx="8" fill="#f2fbf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="804" y="84" text-anchor="middle" font-family="Arial" font-size="13" fill="#111827">Metrology</text>
  <text x="804" y="103" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">measure and inspect</text>
  <path d="M142 89 L172 89" stroke="#4b5563" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M296 89 L326 89" stroke="#4b5563" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M422 89 L452 89" stroke="#4b5563" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M584 89 L614 89" stroke="#4b5563" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <path d="M708 89 L738 89" stroke="#4b5563" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>
  <rect x="156" y="226" width="610" height="72" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.7"/>
  <text x="461" y="252" text-anchor="middle" font-family="Arial" font-size="13" fill="#111827">Sensor log for one wafer</text>
  <text x="461" y="276" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">temperature, pressure, flow, power, time, recipe, chamber, inspection readings, ...</text>
  <text x="461" y="292" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">becomes one dataset row: Sensor-1 ... Sensor-590 plus Good/Bad label</text>
  <path d="M86 120 C86 168 250 178 250 226" stroke="#9ca3af" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M234 120 C234 163 320 181 330 226" stroke="#9ca3af" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M374 120 C374 160 405 180 416 226" stroke="#9ca3af" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M518 120 C518 160 518 181 518 226" stroke="#9ca3af" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M661 120 C661 161 610 181 600 226" stroke="#9ca3af" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <path d="M804 120 C804 170 692 181 674 226" stroke="#9ca3af" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <text x="42" y="186" font-family="Arial" font-size="11" fill="#374151">Sensors tap off each stage</text>
</svg>