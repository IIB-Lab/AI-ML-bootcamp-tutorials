<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="700" height="200" fill="white"/>
  <g>
    <rect x="20"  y="70" width="90" height="46" rx="8" fill="#eaf2fb" stroke="#4682b4"/>
    <rect x="160" y="70" width="90" height="46" rx="8" fill="#fdeaea" stroke="#c0392b"/>
    <rect x="300" y="70" width="90" height="46" rx="8" fill="#fdeaea" stroke="#c0392b"/>
    <rect x="440" y="70" width="90" height="46" rx="8" fill="#eafaf0" stroke="#27ae60"/>
    <rect x="580" y="70" width="100" height="46" rx="8" fill="#fef6e0" stroke="#e0a800"/>
  </g>
  <text x="65"  y="98" text-anchor="middle">x</text>
  <text x="205" y="92" text-anchor="middle">z₁ = W₁x+b₁</text>
  <text x="345" y="92" text-anchor="middle">a₁ = σ(z₁)</text>
  <text x="485" y="98" text-anchor="middle">ŷ = W₂a₁+b₂</text>
  <text x="630" y="98" text-anchor="middle">loss L</text>
  <g stroke="#2e7d32" stroke-width="2" fill="none" marker-end="url(#fg)">
    <line x1="110" y1="82" x2="160" y2="82"/><line x1="250" y1="82" x2="300" y2="82"/>
    <line x1="390" y1="82" x2="440" y2="82"/><line x1="530" y1="82" x2="580" y2="82"/>
  </g>
  <text x="350" y="30" text-anchor="middle" fill="#2e7d32">FORWARD: compute the prediction →</text>
  <g stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#bg)">
    <line x1="580" y1="104" x2="530" y2="104"/><line x1="440" y1="104" x2="390" y2="104"/>
    <line x1="300" y1="104" x2="250" y2="104"/><line x1="160" y1="104" x2="110" y2="104"/>
  </g>
  <text x="350" y="165" text-anchor="middle" fill="#c0392b">← BACKWARD: propagate the gradient of L to every weight</text>
  <defs>
    <marker id="fg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2e7d32"/></marker>
    <marker id="bg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker>
  </defs>
</svg>