<svg width="660" height="150" viewBox="0 0 660 150" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <rect x="0" y="0" width="660" height="150" fill="white"/>
  <g font-size="14" font-weight="bold">
    <text x="110" y="24" text-anchor="middle">too simple</text>
    <text x="330" y="24" text-anchor="middle">just right</text>
    <text x="550" y="24" text-anchor="middle">too complex</text>
  </g>
  <g transform="translate(30,40)"><rect width="160" height="90" fill="#f7f7f7" stroke="#ccc"/>
    <path d="M10,20 Q80,80 150,20" fill="none" stroke="#4682b4" stroke-width="1.5" stroke-dasharray="3 3"/>
    <line x1="10" y1="55" x2="150" y2="55" stroke="#c0392b" stroke-width="2.5"/>
    <text x="80" y="84" text-anchor="middle" font-size="11" fill="#777">underfit (high bias)</text></g>
  <g transform="translate(250,40)"><rect width="160" height="90" fill="#f7f7f7" stroke="#ccc"/>
    <path d="M10,20 Q80,80 150,20" fill="none" stroke="#4682b4" stroke-width="1.5" stroke-dasharray="3 3"/>
    <path d="M10,22 Q80,78 150,22" fill="none" stroke="#27ae60" stroke-width="2.5"/>
    <text x="80" y="84" text-anchor="middle" font-size="11" fill="#777">generalises</text></g>
  <g transform="translate(470,40)"><rect width="160" height="90" fill="#f7f7f7" stroke="#ccc"/>
    <path d="M10,20 Q80,80 150,20" fill="none" stroke="#4682b4" stroke-width="1.5" stroke-dasharray="3 3"/>
    <path d="M10,25 C30,10 40,70 60,40 C80,15 95,72 115,35 C130,15 140,60 150,25" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    <text x="80" y="84" text-anchor="middle" font-size="11" fill="#777">overfit (high variance)</text></g>
</svg>